<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spins | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* APP CONTAINER */
        .app {
            height: 100vh;
            background: #0f0f0f;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* LEFT SIDEBAR - MODERN TG STYLE */
        .sidebar {
            width: 100%;
            max-width: 360px;
            background: #111111;
            border-right: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 60px 16px 16px;
            background: linear-gradient(180deg, #111111 0%, #0f0f0f 100%);
        }

        .sidebar-header h1 {
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #6c6c6c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            margin: 12px 16px;
            background: #1e1e1e;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .search-box:focus-within {
            background: #252525;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 17px;
        }

        .search-box input::placeholder {
            color: #6c6c6c;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e1e1e;
            border-radius: 14px;
            margin-top: 8px;
            z-index: 200;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 14px 16px;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
            font-size: 16px;
            border-bottom: 0.5px solid #2a2a2a;
        }

        .search-result-item:active {
            background: #2a2a2a;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:active {
            background: #1a1a1a;
            transform: scale(0.98);
        }

        .chat-item.active {
            background: #1e1e1e;
        }

        .avatar-small {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .premium-avatar {
            box-shadow: 0 0 0 2px #ffd700, 0 0 0 5px rgba(255,215,0,0.2);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-preview {
            font-size: 13px;
            color: #8e8e8e;
            margin-top: 2px;
        }

        .create-btn {
            margin: 8px 16px;
            background: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .create-btn:active {
            background: #2a2a2a;
            transform: scale(0.98);
        }

        /* CENTRAL CHAT - FULLSCREEN MOBILE */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            position: relative;
        }

        .chat-header {
            padding: 12px 16px;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e1e1e;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-btn:active {
            background: #2a2a2a;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-title {
            font-weight: 600;
            color: #fff;
            font-size: 17px;
        }

        .chat-header-status {
            font-size: 13px;
            color: #6c6c6c;
            margin-top: 2px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeSlide 0.2s ease;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            background: #1e1e1e;
            padding: 10px 14px;
            border-radius: 18px;
            color: #fff;
            position: relative;
        }

        .message.own .message-bubble {
            background: #2b5278;
        }

        .message-media {
            max-width: 220px;
            border-radius: 14px;
            margin-top: 4px;
            cursor: pointer;
        }

        .circle-video {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .voice-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .voice-play-btn:active {
            background: #3a3a3a;
            transform: scale(0.95);
        }

        .voice-wave {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .voice-wave span {
            width: 3px;
            background: #6c6c6c;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        .voice-wave span:nth-child(1) { animation-delay: 0s; }
        .voice-wave span:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave span:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave span:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave span:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 28px; }
        }

        .message-time {
            font-size: 10px;
            color: #6c6c6c;
            margin-top: 4px;
            text-align: right;
        }

        .message-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.1s;
            position: absolute;
            right: 8px;
            top: -24px;
        }
        
        .message:hover .message-actions { 
            opacity: 1; 
        }
        
        .action-icon {
            background: #2a2a2a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        .input-area {
            padding: 10px 16px;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 0.5px solid #1f1f1f;
        }

        .input-area input {
            flex: 1;
            background: #1e1e1e;
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: #fff;
            font-size: 16px;
        }

        .input-area input:focus {
            outline: none;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1e1e1e;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:active {
            background: #2a2a2a;
            transform: scale(0.95);
        }

        /* RIGHT PANEL - MODERN */
        .right-panel {
            width: 100%;
            max-width: 320px;
            background: #111111;
            border-left: 1px solid #1f1f1f;
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
        }

        .right-panel-section {
            padding: 20px;
            border-bottom: 0.5px solid #1f1f1f;
        }

        .user-card {
            text-align: center;
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            margin-top: 12px;
        }

        .animated-check {
            width: 18px;
            height: 18px;
            animation: checkPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes checkPop {
            0% { transform: scale(0) rotate(-180deg); }
            80% { transform: scale(1.2) rotate(0); }
            100% { transform: scale(1) rotate(0); }
        }

        .settings-btn {
            width: 100%;
            background: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .settings-btn:active {
            background: #2a2a2a;
            transform: scale(0.98);
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-card {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-card h3 {
            color: #fff;
            margin-bottom: 16px;
            font-size: 20px;
        }
        
        .modal-card input, .modal-card select {
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            background: #2a2a2a;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
        }
        
        .modal-card button {
            margin-top: 12px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            color: #fff;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .recording-active {
            background: #ff4444 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* MOBILE STYLES */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                transform: translateX(-100%);
                box-shadow: 0 0 30px rgba(0,0,0,0.5);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .right-panel {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                transform: translateX(100%);
                box-shadow: -5px 0 30px rgba(0,0,0,0.5);
            }
            
            .right-panel.open {
                transform: translateX(0);
            }
            
            .back-btn {
                display: flex;
            }
            
            .message {
                max-width: 90%;
            }
            
            .sidebar-header {
                padding-top: 50px;
            }
            
            .chat-header {
                padding: 10px 12px;
            }
            
            .messages-container {
                padding: 12px;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // STORAGE KEYS
    const STORAGE_USERS = 'spins_users';
    const STORAGE_CHATS = 'spins_chats';
    const STORAGE_CHANNELS = 'spins_channels';
    const STORAGE_MESSAGES = 'spins_messages';
    const STORAGE_SESSION = 'spins_session';

    let currentUser = null;
    let activeChatId = null;
    let activeChatType = 'chat';
    let channelsList = [];
    let chatsList = [];
    let allMessages = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? 'rgba(199,42,42,0.95)' : 'rgba(30,30,30,0.95)';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function loadUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS)) || []; }
    function saveChats(chats) { localStorage.setItem(STORAGE_CHATS, JSON.stringify(chats)); }
    function loadChats() { return JSON.parse(localStorage.getItem(STORAGE_CHATS)) || []; }
    function saveChannels(channels) { localStorage.setItem(STORAGE_CHANNELS, JSON.stringify(channels)); }
    function loadChannels() { return JSON.parse(localStorage.getItem(STORAGE_CHANNELS)) || []; }
    function saveMessages(msgs) { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(msgs)); }
    function loadMessages() { return JSON.parse(localStorage.getItem(STORAGE_MESSAGES)) || []; }

    function findUserByUsername(username) { return loadUsers().find(u => u.username.toLowerCase() === username.toLowerCase()); }
    function findUserById(uid) { return loadUsers().find(u => u.uid === uid); }
    function isPremium(uid) { const u = findUserById(uid); return u?.premium || false; }
    function getDefaultAvatar() { return "https://ui-avatars.com/api/?background=2b5278&color=fff&bold=true&size=128&rounded=true"; }

    function createOrGetChat(userA, userB) {
        let existing = chatsList.find(c => c.participants.includes(userA) && c.participants.includes(userB));
        if(existing) return existing.id;
        const newId = `chat_${Date.now()}_${Math.random()}`;
        chatsList.push({ id: newId, participants: [userA, userB], type: 'chat', name: null, createdAt: Date.now(), admins: [] });
        saveChats(chatsList);
        return newId;
    }

    function createChannel(ownerId, channelName) {
        if(channelsList.filter(ch => ch.owner === ownerId).length >= 5) { 
            showToast("Лимит: 5 каналов", true);
            return null; 
        }
        if(channelsList.some(ch => ch.username.toLowerCase() === channelName.toLowerCase())) { 
            showToast("Канал существует", true);
            return null; 
        }
        const newChannel = { 
            id: `channel_${Date.now()}`, 
            owner: ownerId, 
            username: channelName, 
            subscribers: [ownerId], 
            admins: [ownerId],
            name: channelName, 
            createdAt: Date.now(),
            description: ''
        };
        channelsList.push(newChannel);
        saveChannels(channelsList);
        showToast(`Канал @${channelName} создан`);
        return newChannel.id;
    }

    function subscribeToChannel(userId, channelId) {
        const ch = channelsList.find(c => c.id === channelId);
        if(ch && !ch.subscribers.includes(userId)) { 
            ch.subscribers.push(userId); 
            saveChannels(channelsList); 
            showToast(`Подписка на ${ch.username}`);
            return true; 
        }
        return false;
    }

    function addChannelAdmin(channelId, userId) {
        const ch = channelsList.find(c => c.id === channelId);
        if(ch && ch.owner === currentUser.uid && !ch.admins.includes(userId)) {
            ch.admins.push(userId);
            saveChannels(channelsList);
            showToast(`Администратор добавлен`);
            return true;
        }
        return false;
    }

    function removeChannelAdmin(channelId, userId) {
        const ch = channelsList.find(c => c.id === channelId);
        if(ch && ch.owner === currentUser.uid && userId !== ch.owner) {
            ch.admins = ch.admins.filter(id => id !== userId);
            saveChannels(channelsList);
            showToast(`Администратор удален`);
            return true;
        }
        return false;
    }

    async function sendMessage(chatId, senderId, text, type='text', mediaUrl=null, duration=null) {
        if(!text && !mediaUrl) return;
        
        const newMsg = { 
            id: Date.now() + Math.random(), 
            chatId, 
            senderId, 
            text: text || '', 
            type, 
            mediaUrl, 
            timestamp: Date.now(), 
            edited: false, 
            deleted: false,
            duration: duration
        };
        allMessages.push(newMsg);
        saveMessages(allMessages);
        
        setTimeout(() => {
            const messagesContainer = document.querySelector('.messages-container');
            if(messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
        
        renderApp();
    }

    function deleteMessage(msgId) {
        const msg = allMessages.find(m => m.id == msgId);
        if(msg && msg.senderId === currentUser.uid) { 
            msg.deleted = true;
            saveMessages(allMessages); 
            renderApp();
            showToast("Сообщение удалено");
        }
    }
    
    function editMessage(msgId, newText) { 
        let m = allMessages.find(m=>m.id==msgId); 
        if(m && m.senderId===currentUser.uid && newText && newText.trim()){ 
            m.text=newText.trim(); 
            m.edited=true; 
            saveMessages(allMessages); 
            renderApp();
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                sendMessage(activeChatId, currentUser.uid, '', 'voice', audioUrl, audioBlob.size);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const voiceBtn = document.querySelector('#voiceRecordBtn');
            if(voiceBtn) voiceBtn.classList.add('recording-active');
            showToast("🎙️ Запись... Нажмите еще раз для отправки");
        } catch(err) {
            showToast("Ошибка доступа к микрофону", true);
        }
    }

    function stopRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const voiceBtn = document.querySelector('#voiceRecordBtn');
            if(voiceBtn) voiceBtn.classList.remove('recording-active');
        }
    }

    function toggleRecording() {
        if(isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }

    function getChatMessages(chatKey) {
        return allMessages.filter(m => m.chatId === chatKey && !m.deleted).sort((a,b)=>a.timestamp - b.timestamp);
    }

    function initAuth() {
        let users = loadUsers();
        if(users.length === 0) {
            const demoUser = { 
                uid: 'u_demo', 
                phone: '+79991234567', 
                username: 'Алексей', 
                password: '123', 
                premium: true, 
                avatar: getDefaultAvatar(), 
                createdAt: Date.now(),
                bio: 'Люблю общаться'
            };
            users.push(demoUser);
            saveUsers(users);
        }
        
        const session = localStorage.getItem(STORAGE_SESSION);
        if(session) {
            try{
                const userData = JSON.parse(session);
                const found = loadUsers().find(u=>u.uid === userData.uid);
                if(found){
                    currentUser = found;
                    loadMainData();
                    renderApp();
                    return;
                }
            }catch(e){}
        }
        showAuthScreen();
    }

    function loadMainData() {
        chatsList = loadChats();
        channelsList = loadChannels();
        allMessages = loadMessages();
    }

    function showAuthScreen() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div style="display:flex; align-items:center; justify-content:center; height:100vh; background:#000;">
                <div style="background:#1e1e1e; padding:40px; border-radius:28px; width:340px; max-width:90%; text-align:center;">
                    <h1 style="color:#fff; margin-bottom:24px; font-size:36px;">✨ Spins</h1>
                    <div id="authForm"></div>
                </div>
            </div>
        `;
        renderAuthForm('login');
    }

    function renderAuthForm(mode) {
        const formDiv = document.getElementById('authForm');
        if(mode === 'login'){
            formDiv.innerHTML = `
                <input id="loginPhone" placeholder="Телефон" style="width:100%; margin:8px 0; padding:14px; border-radius:14px; background:#2a2a2a; border:none; color:#fff; font-size:16px;">
                <input id="loginPass" type="password" placeholder="Пароль" style="width:100%; margin:8px 0; padding:14px; border-radius:14px; background:#2a2a2a; border:none; color:#fff; font-size:16px;">
                <button id="doLoginBtn" style="background:#2b5278; width:100%; margin-top:12px; padding:14px; border:none; border-radius:14px; color:#fff; font-weight:600; font-size:16px; cursor:pointer;">Войти</button>
                <p style="margin-top:16px; color:#8e8e8e;"><a href="#" id="toReg" style="color:#2b5278;">Нет аккаунта? Регистрация</a></p>
            `;
            document.getElementById('doLoginBtn')?.addEventListener('click',()=>{
                const phone = document.getElementById('loginPhone').value.trim();
                const pass = document.getElementById('loginPass').value;
                const users = loadUsers();
                const user = users.find(u=>u.phone === phone && u.password === pass);
                if(user){ 
                    currentUser = user; 
                    localStorage.setItem(STORAGE_SESSION, JSON.stringify({uid:user.uid})); 
                    loadMainData(); 
                    renderApp(); 
                } else { 
                    showToast("Неверный номер или пароль", true);
                }
            });
            document.getElementById('toReg')?.addEventListener('click',(e)=>{e.preventDefault(); renderAuthForm('register');});
        } else {
            formDiv.innerHTML = `
                <input id="regPhone" placeholder="Телефон" style="width:100%; margin:8px 0; padding:14px; border-radius:14px; background:#2a2a2a; border:none; color:#fff; font-size:16px;">
                <input id="regUser" placeholder="Имя пользователя" style="width:100%; margin:8px 0; padding:14px; border-radius:14px; background:#2a2a2a; border:none; color:#fff; font-size:16px;">
                <input id="regPass" type="password" placeholder="Пароль" style="width:100%; margin:8px 0; padding:14px; border-radius:14px; background:#2a2a2a; border:none; color:#fff; font-size:16px;">
                <button id="doRegBtn" style="background:#2b5278; width:100%; margin-top:12px; padding:14px; border:none; border-radius:14px; color:#fff; font-weight:600; font-size:16px; cursor:pointer;">Создать</button>
                <p style="margin-top:16px; color:#8e8e8e;"><a href="#" id="toLogin" style="color:#2b5278;">Уже есть аккаунт?</a></p>
            `;
            document.getElementById('doRegBtn')?.addEventListener('click',()=>{
                const phone = document.getElementById('regPhone').value.trim();
                const username = document.getElementById('regUser').value.trim();
                const pass = document.getElementById('regPass').value;
                
                if(username.length<2){ showToast("Минимум 2 символа", true); return; }
                if(pass.length<3){ showToast("Пароль минимум 3 символа", true); return; }
                
                const users = loadUsers();
                if(users.find(u=>u.username.toLowerCase() === username.toLowerCase())){ showToast("Имя занято", true); return; }
                if(users.find(u=>u.phone === phone)){ showToast("Телефон занят", true); return; }
                
                const newUser = { 
                    uid: 'u'+Date.now(), 
                    phone, 
                    username, 
                    password: pass, 
                    premium: false, 
                    avatar: getDefaultAvatar(), 
                    createdAt: Date.now(),
                    bio: ''
                };
                users.push(newUser);
                saveUsers(users);
                showToast("Регистрация успешна!");
                renderAuthForm('login');
            });
            document.getElementById('toLogin')?.addEventListener('click',(e)=>{e.preventDefault(); renderAuthForm('login');});
        }
    }

    function showChannelSettings(channel) {
        const allUsers = loadUsers();
        const isOwner = channel.owner === currentUser.uid;
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>📢 ${channel.username}</h3>
                ${isOwner ? `
                    <button class="settings-btn" id="addAdminBtn" style="background:#2a2a2a; margin-bottom:8px;">➕ Добавить администратора</button>
                    <button class="settings-btn" id="removeAdminBtn" style="background:#2a2a2a; margin-bottom:8px;">➖ Удалить администратора</button>
                ` : ''}
                <button id="closeModalBtn" style="background:#2a2a2a;">❌ Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        if(isOwner) {
            document.getElementById('addAdminBtn')?.addEventListener('click', () => {
                const username = prompt("Введите username пользователя:");
                const user = findUserByUsername(username);
                if(user && user.uid !== channel.owner && !channel.admins.includes(user.uid)) {
                    addChannelAdmin(channel.id, user.uid);
                    modal.remove();
                    renderApp();
                } else {
                    showToast("Пользователь не найден или уже админ", true);
                }
            });
            
            document.getElementById('removeAdminBtn')?.addEventListener('click', () => {
                const admins = channel.admins.filter(id => id !== channel.owner);
                if(admins.length === 0) {
                    showToast("Нет администраторов для удаления", true);
                    return;
                }
                const adminList = admins.map(id => findUserById(id)?.username).join(', ');
                const username = prompt(`Администраторы: ${adminList}\nВведите username для удаления:`);
                const user = findUserByUsername(username);
                if(user && channel.admins.includes(user.uid) && user.uid !== channel.owner) {
                    removeChannelAdmin(channel.id, user.uid);
                    modal.remove();
                    renderApp();
                } else {
                    showToast("Пользователь не найден", true);
                }
            });
        }
        
        document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.remove());
    }

    function closeMobileMenus() {
        const sidebar = document.getElementById('sidebar');
        const rightPanel = document.getElementById('rightPanel');
        if(window.innerWidth <= 768) {
            if(sidebar) sidebar.classList.remove('open');
            if(rightPanel) rightPanel.classList.remove('open');
        }
    }

    function renderApp() {
        const root = document.getElementById('root');
        if(!currentUser) return;
        
        const allUsers = loadUsers();
        const userChats = chatsList.filter(c => c.participants.includes(currentUser.uid));
        const userChannels = channelsList.filter(c => c.subscribers.includes(currentUser.uid));
        const combined = [...userChats.map(c=>({id:c.id, name: getChatDisplayName(c, currentUser.uid), type:'chat', data:c})),
                          ...userChannels.map(ch=>({id:ch.id, name: ch.username, type:'channel', data:ch}))];
        
        function getChatDisplayName(chat, myId){
            const otherId = chat.participants.find(p=>p!==myId);
            const other = findUserById(otherId);
            return other?.username || 'Unknown';
        }
        
        const activeChat = activeChatId ? 
            (activeChatType === 'chat' ? chatsList.find(c => c.id === activeChatId) : channelsList.find(c => c.id === activeChatId)) : null;
        
        root.innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <h1>Spins</h1>
                    </div>
                    <div class="search-box" style="position:relative;">
                        <span>🔍</span>
                        <input id="globalSearch" placeholder="Поиск...">
                        <div class="search-results" id="searchResults"></div>
                    </div>
                    <div class="chat-list" id="chatListContainer"></div>
                    <button class="create-btn" id="createNewChatBtn">➕ Новый чат</button>
                    <button class="create-btn" id="createChannelBtn">📢 Создать канал</button>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <button class="back-btn" id="backBtn">←</button>
                            <button class="icon-btn" id="mobileMenuBtn" style="display:none;">☰</button>
                            ${activeChat ? `<img class="chat-header-avatar" src="${activeChatType === 'chat' ? (findUserById(activeChat.participants?.find(p=>p!==currentUser.uid))?.avatar || getDefaultAvatar()) : (findUserById(activeChat.owner)?.avatar || getDefaultAvatar())}">` : ''}
                            <div>
                                <div class="chat-header-title">${activeChat ? (activeChatType === 'chat' ? getChatDisplayName(activeChat, currentUser.uid) : activeChat.username) : 'Spins'}</div>
                                <div class="chat-header-status">${activeChatType === 'channel' && activeChat ? `${activeChat.subscribers?.length || 0} участников` : 'онлайн'}</div>
                            </div>
                        </div>
                        ${activeChat && activeChatType === 'channel' && (activeChat.owner === currentUser.uid || activeChat.admins?.includes(currentUser.uid)) ? 
                            `<button class="icon-btn" id="channelSettingsBtn">⚙️</button>` : 
                            activeChat && activeChatType === 'chat' ?
                            `<button class="icon-btn" id="profileBtn">👤</button>` : ''
                        }
                    </div>
                    <div class="messages-container" id="messagesList">
                        <div style="color:#8e8e8e; text-align:center; padding:40px;">✨ Добро пожаловать в Spins</div>
                    </div>
                    <div class="input-area" id="inputArea"></div>
                </div>
                <div class="right-panel" id="rightPanel">
                    <div class="right-panel-section user-card">
                        <img class="avatar-large ${currentUser.premium ? 'premium-avatar' : ''}" src="${currentUser.avatar}">
                        <div class="chat-header-title">${currentUser.username}</div>
                        ${currentUser.premium ? 
                            `<div class="premium-badge">
                                <svg class="animated-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                PREMIUM
                            </div>` : 
                            `<button id="buyPremiumBtn" style="background:#ffd700; color:#000; margin-top:12px; padding:12px; border-radius:14px; border:none; font-weight:600;">💎 Получить Premium</button>`
                        }
                        <div style="margin-top:16px; font-size:14px; color:#8e8e8e;">${currentUser.bio || 'Нет описания'}</div>
                    </div>
                    <div class="right-panel-section">
                        <button class="settings-btn" id="editProfileBtn">✏️ Редактировать профиль</button>
                        <button class="settings-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        `;
        
        // Mobile menu handling
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const backBtn = document.getElementById('backBtn');
        const sidebar = document.getElementById('sidebar');
        const rightPanel = document.getElementById('rightPanel');
        
        if(window.innerWidth <= 768) {
            mobileMenuBtn.style.display = 'flex';
            mobileMenuBtn.onclick = (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('open');
            };
            
            backBtn.onclick = () => {
                if(sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                } else if(rightPanel.classList.contains('open')) {
                    rightPanel.classList.remove('open');
                } else if(activeChatId) {
                    activeChatId = null;
                    renderApp();
                }
            };
        } else {
            backBtn.style.display = 'none';
        }
        
        // Profile button
        document.getElementById('profileBtn')?.addEventListener('click', () => {
            if(window.innerWidth <= 768) {
                rightPanel.classList.toggle('open');
            }
        });
        
        // Chat list
        const container = document.getElementById('chatListContainer');
        if(combined.length === 0) {
            container.innerHTML = '<div style="color:#8e8e8e; text-align:center; padding:20px;">Нет чатов</div>';
        } else {
            container.innerHTML = combined.map(chat => {
                const isActive = activeChatId === chat.id;
                const otherId = chat.type === 'chat' ? chat.data.participants.find(p=>p!==currentUser.uid) : chat.data.owner;
                const user = findUserById(otherId);
                return `<div class="chat-item ${isActive ? 'active' : ''}" data-id="${chat.id}" data-type="${chat.type}">
                    <img class="avatar-small ${user?.premium ? 'premium-avatar' : ''}" src="${user?.avatar || getDefaultAvatar()}">
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chat.name)} ${user?.premium ? '⭐' : ''}</div>
                        <div class="chat-preview">${chat.type === 'chat' ? '💬' : '📢'} чат</div>
                    </div>
                </div>`;
            }).join('');
        }
        
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                activeChatId = el.dataset.id;
                activeChatType = el.dataset.type;
                closeMobileMenus();
                renderApp();
            });
        });
        
        // Messages
        if(activeChatId) {
            const msgs = getChatMessages(activeChatId);
            const msgDiv = document.getElementById('messagesList');
            
            if(msgs.length === 0) {
                msgDiv.innerHTML = '<div style="color:#8e8e8e; text-align:center; padding:40px;">💬 Нет сообщений</div>';
            } else {
                msgDiv.innerHTML = msgs.map(m => {
                    const isOwn = m.senderId === currentUser.uid;
                    const senderUser = findUserById(m.senderId);
                    
                    return `<div class="message ${isOwn ? 'own' : ''}" data-id="${m.id}">
                        ${!isOwn ? `<img src="${senderUser?.avatar || getDefaultAvatar()}" style="width:36px;height:36px;border-radius:50%;">` : ''}
                        <div class="message-bubble">
                            ${!isOwn ? `<div style="font-size:12px; color:#8e8e8e; margin-bottom:4px;">${escapeHtml(senderUser?.username)}</div>` : ''}
                            ${m.type === 'text' ? `<div>${escapeHtml(m.text)} ${m.edited ? '<span style="font-size:10px;">✏️</span>' : ''}</div>` : ''}
                            ${m.type === 'image' ? `<img src="${m.mediaUrl}" class="message-media" onclick="window.open(this.src)">` : ''}
                            ${m.type === 'video' ? `<video controls src="${m.mediaUrl}" class="message-media"></video>` : ''}
                            ${m.type === 'circle' ? `<video controls class="circle-video" src="${m.mediaUrl}"></video>` : ''}
                            ${m.type === 'voice' ? `
                                <div class="voice-message">
                                    <div class="voice-play-btn" data-url="${m.mediaUrl}">▶️</div>
                                    <div class="voice-wave">
                                        <span></span><span></span><span></span><span></span><span></span>
                                    </div>
                                    <div>🔊</div>
                                </div>
                            ` : ''}
                            <div class="message-time">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="message-actions">
                                ${isOwn ? `<span class="action-icon edit-msg" data-id="${m.id}">✏️</span><span class="action-icon del-msg" data-id="${m.id}">🗑️</span>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
            
            setTimeout(() => {
                const msgContainer = document.querySelector('.messages-container');
                if(msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
            }, 100);
            
            document.querySelectorAll('.edit-msg').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseFloat(btn.dataset.id);
                    const newTxt = prompt("Новый текст");
                    if(newTxt) editMessage(id, newTxt);
                });
            });
            
            document.querySelectorAll('.del-msg').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(confirm("Удалить?")) deleteMessage(parseFloat(btn.dataset.id));
                });
            });
            
            document.querySelectorAll('.voice-play-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const url = btn.dataset.url;
                    const audio = new Audio(url);
                    audio.play();
                    btn.textContent = '⏸️';
                    audio.onended = () => { btn.textContent = '▶️'; };
                });
            });
        }
        
        // Input area
        const inputWrap = document.getElementById('inputArea');
        if(activeChatId) {
            inputWrap.innerHTML = `
                <button class="icon-btn" id="emojiBtn">😊</button>
                <input id="messageText" placeholder="Сообщение..." maxlength="2000">
                <button class="icon-btn" id="sendMsgBtn">➤</button>
                <button class="icon-btn" id="attachBtn">📎</button>
                <button class="icon-btn" id="voiceRecordBtn">🎤</button>
                <button class="icon-btn" id="circleBtn">🟠</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                <input type="file" id="circleInput" accept="video/*" style="display:none;">
            `;
            
            const messageInput = document.getElementById('messageText');
            const sendHandler = () => {
                const txt = messageInput.value;
                if(txt.trim()) {
                    sendMessage(activeChatId, currentUser.uid, txt, 'text');
                    messageInput.value = '';
                }
            };
            
            document.getElementById('sendMsgBtn')?.addEventListener('click', sendHandler);
            messageInput?.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    sendHandler();
                }
            });
            
            document.getElementById('emojiBtn')?.addEventListener('click', () => {
                const emojis = ['😀','😂','😍','🔥','🎉','❤️','👍','😎','🥺','🤣','😱','😭'];
                const pick = prompt(`Выбери эмодзи:\n${emojis.join(' ')}`);
                if(pick) messageInput.value += pick;
            });
            
            document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const max = isPremium(currentUser.uid) ? 100*1024*1024 : 20*1024*1024;
                    if(file.size > max) { showToast(`Лимит ${max/1048576}MB`, true); return; }
                    const url = URL.createObjectURL(file);
                    const type = file.type.startsWith('image/') ? 'image' : 'video';
                    sendMessage(activeChatId, currentUser.uid, '', type, url);
                    e.target.value = '';
                }
            });
            
            document.getElementById('voiceRecordBtn')?.addEventListener('click', toggleRecording);
            
            document.getElementById('circleBtn')?.addEventListener('click', () => document.getElementById('circleInput').click());
            document.getElementById('circleInput')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file && file.type.startsWith('video/')) {
                    if(file.size > 30*1024*1024) { showToast("Кружок до 30MB", true); return; }
                    sendMessage(activeChatId, currentUser.uid, '', 'circle', URL.createObjectURL(file));
                    e.target.value = '';
                }
            });
        }
        
        // Right panel buttons
        document.getElementById('buyPremiumBtn')?.addEventListener('click', () => {
            currentUser.premium = true;
            const all = loadUsers();
            const idx = all.findIndex(u=>u.uid===currentUser.uid);
            if(idx!==-1) all[idx].premium = true;
            saveUsers(all);
            localStorage.setItem(STORAGE_SESSION, JSON.stringify({uid:currentUser.uid}));
            showToast("✨ Premium активирован!");
            renderApp();
        });
        
        document.getElementById('editProfileBtn')?.addEventListener('click', () => {
            const newBio = prompt("Ваше описание:", currentUser.bio || "");
            if(newBio !== null) {
                currentUser.bio = newBio;
                const all = loadUsers();
                const idx = all.findIndex(u=>u.uid===currentUser.uid);
                if(idx!==-1) all[idx].bio = newBio;
                saveUsers(all);
                renderApp();
            }
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem(STORAGE_SESSION);
            currentUser = null;
            showAuthScreen();
        });
        
        document.getElementById('channelSettingsBtn')?.addEventListener('click', () => {
            if(activeChat && activeChatType === 'channel') {
                showChannelSettings(activeChat);
            }
        });
        
        // Search
        const searchInput = document.getElementById('globalSearch');
        const searchResults = document.getElementById('searchResults');
        
        if(searchInput) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if(query.length < 2) {
                    searchResults.classList.remove('active');
                    return;
                }
                
                const matchedUsers = allUsers.filter(u => 
                    u.username.toLowerCase().includes(query) && u.uid !== currentUser.uid
                );
                const matchedChannels = channelsList.filter(ch => 
                    ch.username.toLowerCase().includes(query)
                );
                
                if(matchedUsers.length === 0 && matchedChannels.length === 0) {
                    searchResults.innerHTML = '<div class="search-result-item">Ничего не найдено</div>';
                    searchResults.classList.add('active');
                    return;
                }
                
                let html = '';
                matchedUsers.forEach(u => {
                    html += `<div class="search-result-item" data-type="user" data-id="${u.uid}">👤 ${escapeHtml(u.username)}</div>`;
                });
                matchedChannels.forEach(ch => {
                    html += `<div class="search-result-item" data-type="channel" data-id="${ch.id}">📢 ${escapeHtml(ch.username)}</div>`;
                });
                
                searchResults.innerHTML = html;
                searchResults.classList.add('active');
                
                document.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const type = item.dataset.type;
                        const id = item.dataset.id;
                        
                        if(type === 'user') {
                            const chatId = createOrGetChat(currentUser.uid, id);
                            activeChatId = chatId;
                            activeChatType = 'chat';
                        } else if(type === 'channel') {
                            subscribeToChannel(currentUser.uid, id);
                            activeChatId = id;
                            activeChatType = 'channel';
                        }
                        renderApp();
                        searchResults.classList.remove('active');
                        searchInput.value = '';
                    });
                });
            });
        }
        
        document.getElementById('createNewChatBtn')?.addEventListener('click', () => {
            const username = prompt("Введите username:");
            if(username) {
                const target = findUserByUsername(username);
                if(target && target.uid !== currentUser.uid) {
                    const chatId = createOrGetChat(currentUser.uid, target.uid);
                    activeChatId = chatId;
                    activeChatType = 'chat';
                    renderApp();
                } else {
                    showToast("Пользователь не найден", true);
                }
            }
        });
        
        document.getElementById('createChannelBtn')?.addEventListener('click', () => {
            const name = prompt("Название канала (латиница):");
            if(name && name.match(/^[a-zA-Z0-9_]+$/)) {
                createChannel(currentUser.uid, name);
                renderApp();
            } else if(name) {
                showToast("Только латиница, цифры и _", true);
            }
        });
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    initAuth();
</script>
</body>
  </html>
