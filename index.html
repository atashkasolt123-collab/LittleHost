<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spins | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .app {
            height: 100vh;
            background: #0f0f0f;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* SIDEBAR - MOBILE FIRST */
        .sidebar {
            width: 100%;
            max-width: 360px;
            background: #111111;
            border-right: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 55px 20px 16px;
            background: linear-gradient(180deg, #111111 0%, #0f0f0f 100%);
        }

        .sidebar-header h1 {
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #6c6c6c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-box {
            margin: 12px 16px;
            background: #1e1e1e;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 17px;
        }

        .search-box input::placeholder {
            color: #6c6c6c;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e1e1e;
            border-radius: 14px;
            margin-top: 8px;
            z-index: 200;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 14px 16px;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
            font-size: 16px;
            border-bottom: 0.5px solid #2a2a2a;
        }

        .search-result-item:active {
            background: #2a2a2a;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:active {
            background: #1a1a1a;
            transform: scale(0.98);
        }

        .chat-item.active {
            background: #1e1e1e;
        }

        .avatar-small {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .verified-badge {
            width: 18px;
            height: 18px;
            background: #2b5278;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            margin-left: 4px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chat-preview {
            font-size: 13px;
            color: #8e8e8e;
            margin-top: 2px;
        }

        .create-btn {
            margin: 8px 16px;
            background: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .create-btn:active {
            background: #2a2a2a;
            transform: scale(0.98);
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            position: relative;
        }

        .chat-header {
            padding: 12px 16px;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e1e1e;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-btn:active {
            background: #2a2a2a;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-title {
            font-weight: 600;
            color: #fff;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header-status {
            font-size: 13px;
            color: #6c6c6c;
            margin-top: 2px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeSlide 0.2s ease;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            background: #1e1e1e;
            padding: 10px 14px;
            border-radius: 18px;
            color: #fff;
            position: relative;
        }

        .message.own .message-bubble {
            background: #2b5278;
        }

        .message-media {
            max-width: 220px;
            border-radius: 14px;
            margin-top: 4px;
            cursor: pointer;
        }

        .circle-video {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .voice-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .voice-wave {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .voice-wave span {
            width: 3px;
            background: #6c6c6c;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 28px; }
        }

        .message-time {
            font-size: 10px;
            color: #6c6c6c;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 10px 16px;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 0.5px solid #1f1f1f;
        }

        .input-area input {
            flex: 1;
            background: #1e1e1e;
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: #fff;
            font-size: 16px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1e1e1e;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:active {
            background: #2a2a2a;
            transform: scale(0.95);
        }

        /* RIGHT PANEL - CHAT/CHANNEL INFO */
        .right-panel {
            width: 100%;
            max-width: 380px;
            background: #111111;
            border-left: 1px solid #1f1f1f;
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
        }

        .profile-header {
            background: linear-gradient(135deg, #1a1a1a, #111);
            padding: 30px 20px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .verified-icon {
            background: #2b5278;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .official-badge {
            background: #2b5278;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            display: inline-block;
            margin-top: 8px;
        }

        .settings-btn {
            width: 100%;
            background: #1e1e1e;
            border: none;
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .settings-btn:active {
            background: #2a2a2a;
            transform: scale(0.98);
        }

        .member-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 0.5px solid #1f1f1f;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-card {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-card h3 {
            color: #fff;
            margin-bottom: 16px;
            font-size: 20px;
        }
        
        .modal-card input, .modal-card textarea {
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            background: #2a2a2a;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
        }
        
        .modal-card button {
            margin-top: 12px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            color: #fff;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .recording-active {
            background: #ff4444 !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                transform: translateX(-100%);
                box-shadow: 0 0 30px rgba(0,0,0,0.5);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .right-panel {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                transform: translateX(100%);
                box-shadow: -5px 0 30px rgba(0,0,0,0.5);
            }
            
            .right-panel.open {
                transform: translateX(0);
            }
            
            .back-btn {
                display: flex;
            }
            
            .message {
                max-width: 90%;
            }
            
            .sidebar-header {
                padding-top: 50px;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // STORAGE KEYS
    const STORAGE_USERS = 'spins_users';
    const STORAGE_CHATS = 'spins_chats';
    const STORAGE_CHANNELS = 'spins_channels';
    const STORAGE_MESSAGES = 'spins_messages';
    const STORAGE_SESSION = 'spins_session';

    let currentUser = null;
    let activeChatId = null;
    let activeChatType = 'chat';
    let channelsList = [];
    let chatsList = [];
    let allMessages = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? 'rgba(199,42,42,0.95)' : 'rgba(30,30,30,0.95)';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function loadUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS)) || []; }
    function saveChats(chats) { localStorage.setItem(STORAGE_CHATS, JSON.stringify(chats)); }
    function loadChats() { return JSON.parse(localStorage.getItem(STORAGE_CHATS)) || []; }
    function saveChannels(channels) { localStorage.setItem(STORAGE_CHANNELS, JSON.stringify(channels)); }
    function loadChannels() { return JSON.parse(localStorage.getItem(STORAGE_CHANNELS)) || []; }
    function saveMessages(msgs) { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(msgs)); }
    function loadMessages() { return JSON.parse(localStorage.getItem(STORAGE_MESSAGES)) || []; }

    function findUserByUsername(username) { return loadUsers().find(u => u.username.toLowerCase() === username.toLowerCase()); }
    function findUserById(uid) { return loadUsers().find(u => u.uid === uid); }
    function isPremium(uid) { const u = findUserById(uid); return u?.premium || false; }
    function getDefaultAvatar() { return "https://ui-avatars.com/api/?background=2b5278&color=fff&bold=true&size=128&rounded=true"; }

    // Create official channel Spins Messenger
    function initOfficialChannel() {
        let officialChannel = channelsList.find(ch => ch.username === 'spins');
        if (!officialChannel) {
            const ownerUser = findUserByUsername('id777');
            if (ownerUser) {
                officialChannel = {
                    id: 'channel_official_spins',
                    owner: ownerUser.uid,
                    username: 'spins',
                    name: 'Spins Messenger',
                    subscribers: [],
                    admins: [ownerUser.uid],
                    createdAt: Date.now(),
                    description: 'The Official Spins Channel — все новости и обновления мессенджера!',
                    avatar: getDefaultAvatar(),
                    verified: true,
                    official: true
                };
                channelsList.push(officialChannel);
                saveChannels(channelsList);
            }
        }
        // Auto-subscribe all users to official channel
        const allUsers = loadUsers();
        allUsers.forEach(user => {
            if (officialChannel && !officialChannel.subscribers.includes(user.uid)) {
                officialChannel.subscribers.push(user.uid);
            }
        });
        saveChannels(channelsList);
        return officialChannel;
    }

    function createOrGetChat(userA, userB) {
        let existing = chatsList.find(c => c.participants.includes(userA) && c.participants.includes(userB));
        if(existing) return existing.id;
        const newId = `chat_${Date.now()}_${Math.random()}`;
        chatsList.push({ 
            id: newId, 
            participants: [userA, userB], 
            type: 'chat', 
            name: null, 
            createdAt: Date.now(), 
            admins: [],
            avatar: null,
            description: '',
            inviteLink: null
        });
        saveChats(chatsList);
        return newId;
    }

    function createChannel(ownerId, channelName) {
        if(channelsList.filter(ch => ch.owner === ownerId).length >= 5) { 
            showToast("Лимит: 5 каналов", true);
            return null; 
        }
        if(channelsList.some(ch => ch.username.toLowerCase() === channelName.toLowerCase())) { 
            showToast("Канал существует", true);
            return null; 
        }
        const newChannel = { 
            id: `channel_${Date.now()}`, 
            owner: ownerId, 
            username: channelName, 
            subscribers: [ownerId], 
            admins: [ownerId],
            name: channelName, 
            createdAt: Date.now(),
            description: '',
            avatar: null,
            inviteLink: null,
            verified: false,
            official: false
        };
        channelsList.push(newChannel);
        saveChannels(channelsList);
        showToast(`Канал @${channelName} создан`);
        return newChannel.id;
    }

    function subscribeToChannel(userId, channelId) {
        const ch = channelsList.find(c => c.id === channelId);
        if(ch && !ch.subscribers.includes(userId)) { 
            ch.subscribers.push(userId); 
            saveChannels(channelsList); 
            showToast(`Подписка на ${ch.username}`);
            return true; 
        }
        return false;
    }

    function updateChatAvatar(chatId, avatarUrl) {
        const chat = chatsList.find(c => c.id === chatId);
        if(chat) {
            chat.avatar = avatarUrl;
            saveChats(chatsList);
            renderApp();
        }
    }

    function updateChannelAvatar(channelId, avatarUrl) {
        const channel = channelsList.find(c => c.id === channelId);
        if(channel) {
            channel.avatar = avatarUrl;
            saveChannels(channelsList);
            renderApp();
        }
    }

    function updateChatInfo(chatId, updates) {
        const chat = chatsList.find(c => c.id === chatId);
        if(chat && (chat.participants.includes(currentUser.uid) || chat.admins.includes(currentUser.uid))) {
            Object.assign(chat, updates);
            saveChats(chatsList);
            renderApp();
        }
    }

    function updateChannelInfo(channelId, updates) {
        const channel = channelsList.find(c => c.id === channelId);
        if(channel && (channel.owner === currentUser.uid || channel.admins.includes(currentUser.uid))) {
            Object.assign(channel, updates);
            saveChannels(channelsList);
            renderApp();
        }
    }

    function generateInviteLink(chatId, type) {
        const link = `${window.location.origin}/invite/${type}/${chatId}/${Date.now()}`;
        if(type === 'chat') {
            const chat = chatsList.find(c => c.id === chatId);
            if(chat) chat.inviteLink = link;
        } else {
            const channel = channelsList.find(c => c.id === chatId);
            if(channel) channel.inviteLink = link;
        }
        saveChats(chatsList);
        saveChannels(channelsList);
        return link;
    }

    async function sendMessage(chatId, senderId, text, type='text', mediaUrl=null, duration=null) {
        if(!text && !mediaUrl) return;
        
        const newMsg = { 
            id: Date.now() + Math.random(), 
            chatId, 
            senderId, 
            text: text || '', 
            type, 
            mediaUrl, 
            timestamp: Date.now(), 
            edited: false, 
            deleted: false,
            duration: duration
        };
        allMessages.push(newMsg);
        saveMessages(allMessages);
        
        setTimeout(() => {
            const messagesContainer = document.querySelector('.messages-container');
            if(messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
        
        renderApp();
    }

    function deleteMessage(msgId) {
        const msg = allMessages.find(m => m.id == msgId);
        if(msg && msg.senderId === currentUser.uid) { 
            msg.deleted = true;
            saveMessages(allMessages); 
            renderApp();
            showToast("Сообщение удалено");
        }
    }
    
    function editMessage(msgId, newText) { 
        let m = allMessages.find(m=>m.id==msgId); 
        if(m && m.senderId===currentUser.uid && newText && newText.trim()){ 
            m.text=newText.trim(); 
            m.edited=true; 
            saveMessages(allMessages); 
            renderApp();
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                sendMessage(activeChatId, currentUser.uid, '', 'voice', audioUrl, audioBlob.size);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const voiceBtn = document.querySelector('#voiceRecordBtn');
            if(voiceBtn) voiceBtn.classList.add('recording-active');
            showToast("🎙️ Запись... Нажмите еще раз для отправки");
        } catch(err) {
            showToast("Ошибка доступа к микрофону", true);
        }
    }

    function stopRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const voiceBtn = document.querySelector('#voiceRecordBtn');
            if(voiceBtn) voiceBtn.classList.remove('recording-active');
        }
    }

    function toggleRecording() {
        if(isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }

    function getChatMessages(chatKey) {
        return allMessages.filter(m => m.chatId === chatKey && !m.deleted).sort((a,b)=>a.timestamp - b.timestamp);
    }

    function showChatInfo(chat, type) {
        const isAdmin = type === 'channel' ? (chat.owner === currentUser.uid || chat.admins?.includes(currentUser.uid)) : chat.participants.includes(currentUser.uid);
        const allUsers = loadUsers();
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        
        let membersList = '';
        if(type === 'channel') {
            membersList = '<div class="member-list">';
            chat.subscribers.forEach(uid => {
                const user = findUserById(uid);
                if(user) {
                    membersList += `
                        <div class="member-item">
                            <img class="member-avatar" src="${user.avatar}">
                            <div>
                                <div style="color:#fff;">${user.username} ${chat.admins?.includes(uid) ? '👑' : ''}</div>
                                <div style="font-size:12px; color:#6c6c6c;">${chat.owner === uid ? 'Владелец' : 'Участник'}</div>
                            </div>
                        </div>
                    `;
                }
            });
            membersList += '</div>';
        }
        
        modal.innerHTML = `
            <div class="modal-card">
                <h3>${type === 'channel' ? '📢' : '💬'} ${chat.name || chat.username}</h3>
                ${isAdmin ? `
                    <button class="settings-btn" id="changeAvatarBtn" style="background:#2a2a2a;">🖼️ Сменить аватар</button>
                    <button class="settings-btn" id="editInfoBtn" style="background:#2a2a2a;">✏️ Редактировать</button>
                    <button class="settings-btn" id="generateInviteBtn" style="background:#2a2a2a;">🔗 Ссылка-приглашение</button>
                ` : ''}
                ${type === 'channel' ? `<div style="margin-top:16px;"><strong style="color:#fff;">Участники (${chat.subscribers?.length || 0})</strong>${membersList}</div>` : ''}
                <button id="closeModalBtn" style="background:#2a2a2a; margin-top:16px;">❌ Закрыть</button>
                <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
            </div>
        `;
        document.body.appendChild(modal);
        
        if(isAdmin) {
            document.getElementById('changeAvatarBtn')?.addEventListener('click', () => document.getElementById('avatarUpload').click());
            document.getElementById('avatarUpload')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        if(type === 'channel') {
                            updateChannelAvatar(chat.id, ev.target.result);
                        } else {
                            updateChatAvatar(chat.id, ev.target.result);
                        }
                        modal.remove();
                        showToast("Аватар обновлен!");
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            document.getElementById('editInfoBtn')?.addEventListener('click', () => {
                const newName = prompt("Название:", chat.name || chat.username);
                const newDesc = prompt("Описание:", chat.description || "");
                if(type === 'channel') {
                    updateChannelInfo(chat.id, { name: newName, description: newDesc });
                } else {
                    updateChatInfo(chat.id, { name: newName, description: newDesc });
                }
                modal.remove();
            });
            
            document.getElementById('generateInviteBtn')?.addEventListener('click', () => {
                const link = generateInviteLink(chat.id, type);
                showToast(`Ссылка скопирована: ${link}`);
                navigator.clipboard?.writeText(link);
                modal.remove();
            });
        }
        
        document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.remove());
    }

            showToast("✨ Premium активирован!");

                if(file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        currentUser.avatar = ev.target.result;
                        const all = loadUsers();
                        const idx = all.findIndex(u=>u.uid===currentUser.uid);
                        if(idx!==-1) all[idx].avatar = ev.target.result;
                        saveUsers(all);
                        renderApp();
                        showToast("Аватар обновлен!");
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
        
        // Search
        const searchInput = document.getElementById('globalSearch');
        const searchResults = document.getElementById('searchResults');
        if(searchInput) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if(query.length < 2) { searchResults.classList.remove('active'); return; }
                const matchedUsers = allUsers.filter(u => u.username.toLowerCase().includes(query) && u.uid !== currentUser.uid);
                const matchedChannels = channelsList.filter(ch => ch.username.toLowerCase().includes(query));
                if(matchedUsers.length === 0 && matchedChannels.length === 0) {
                    searchResults.innerHTML = '<div class="search-result-item">Ничего не найдено</div>';
                    searchResults.classList.add('active');
                    return;
                }
                let html = '';
                matchedUsers.forEach(u => { html += `<div class="search-result-item" data-type="user" data-id="${u.uid}">👤 ${escapeHtml(u.username)}</div>`; });
                matchedChannels.forEach(ch => { html += `<div class="search-result-item" data-type="channel" data-id="${ch.id}">📢 ${escapeHtml(ch.username)}</div>`; });

                    item.addEventListener('click', () => {
                        const type = item.dataset.type;
                        const id = item.dataset.id;
                        if(type === 'user') {
                            const chatId = createOrGetChat(currentUser.uid, id);
                            activeChatId = chatId;
                            activeChatType = 'chat';
                        } else {
                            subscribeToChannel(currentUser.uid, id);
                            activeChatId = id;
                            activeChatType = 'channel';
                        }
                        renderApp();
                        searchResults.classList.remove('active');
                        searchInput.value = '';
                    });
                });
            });
        }
        
        document.getElementById('createNewChatBtn')?.addEventListener('click', () => {
            const username = prompt("Username:");
            if(username) {
                const target = findUserByUsername(username);
                if(target && target.uid !== currentUser.uid) {
                    const chatId = createOrGetChat(currentUser.uid, target.uid);
                    activeChatId = chatId;
                    activeChatType = 'chat';
                    renderApp();
                } else showToast("Не найден", true);
            }
        });
        
        document.getElementById('createChannelBtn')?.addEventListener('click', () => {
            const name = prompt("Название канала (латиница):");
            if(name && name.match(/^[a-zA-Z0-9_]+$/)) {
                createChannel(currentUser.uid, name);
                renderApp();
            } else if(name) showToast("Только латиница, цифры и _", true);
        });
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
    }
    
    initAuth();
</script>
</body>
  </html>
